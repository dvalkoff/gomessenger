name: messenger

services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: messenger_app
      POSTGRES_DB: messenger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s
    ports: # TODO: remove ports
      - 5432:5432

  adminer:
    image: adminer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 80:8080

  liquibase:
    build: ./migrations/
    container_name: liquibase
    depends_on:
      db:
        condition: service_healthy
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://db:5432/messenger
      LIQUIBASE_COMMAND_USERNAME: messenger_app
      LIQUIBASE_COMMAND_PASSWORD: password

